<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mock Examination Login</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+Bengali:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Base CSS -->
    <link rel="stylesheet" href="assets/css/base.css" />
    <!-- Styles CSS -->
    <link rel="stylesheet" href="assets/css/styles.css" />
    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <!-- Axios JS -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body x-data="assessmentConfigDetails()">
    <!-- Header Starts -->
    <header class="border border-bottom">
      <div class="container-fluid bg-body-tertiary">
        <div class="row align-items-center py-2">
          <div class="col-md-6">
            <div class="pb-2">
              <div
                class="fw-bold text-uppercase border border-4 border-black rounded py-2 px-3 d-inline-block text-center bg-warning-subtle"
              >
                <!-- name of examination -->
                <span x-text="examination_name"></span>
              </div>
            </div>
          </div>

          <div class="col-md-6 d-flex justify-content-end align-items-center">
            <!-- Show Setting Dropdown button  -->
            <div class="dropdown">
              <button
                class="btn btn-secondary dropdown-toggle btn-sm"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-gear"></i>
                Settings
              </button>
              <ul class="dropdown-menu">
                <li>
                  <a
                    class="dropdown-item"
                    href="javascript:void(0);"
                    onclick="openFullscreen()"
                  >
                    <i class="bi bi-arrows-fullscreen"></i>
                    Open Fullscreen
                  </a>
                </li>
                <li>
                  <a
                    class="dropdown-item"
                    href="javascript:void(0);"
                    onclick="closeFullscreen()"
                  >
                    <i class="bi bi-x-lg"></i>
                    Close Fullscreen
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </header>
    <!-- Header Ends -->

    <!-- Main Content Starts -->
    <main class="mb-5 pb-5">
        
        <!-- confirmation by candidate -->
         <!--------------------------------------- 
         1) Candidate Name, 
         2) Candidate Roll Number,
         3) Candidate Photograph,
         4) Examination Name,
         5) Examination Date and Time, will be shown to the candidate for confirmation before starting the examination.
         --------------------------------------------->

         <div class="container py-3">
            <div class="row justify-content-center align-items-center" style="height: 60vh;">
                <div class="col-md-6">
                    <div class="card mb-5">
                        <div class="card-header fw-bold">
                            Please Confirm Your Details
                        </div>
                        <div class="card-body text-center">
                            <table class="table table-bordered">
                                <tr>
                                    <th>Candidate Name</th>
                                    <td x-text="candidate_name"></td>
                                </tr>
                                <tr>
                                    <th>Candidate ID / Roll Number</th>
                                    <td x-text="candidate_id"></td>
                                </tr>
                                <tr>
                                    <th>Candidate Photograph</th>
                                    <td>
                                        <template x-if="candidate_photo_path">
                                            <img :src="candidate_photo_path" alt="Candidate Photo" class="img-thumbnail w-100 h-100 object-fit-cover" style="max-width: 150px;">
                                        </template>
                                        <template x-if="!candidate_photo_path">
                                            <span>No Photo Available</span>
                                        </template>

                                    </td>
                                </tr>
                                <tr>
                                    <th>Examination Name</th>
                                    <td x-text="examination_name"></td>
                                </tr>
                                <tr x-data="{date:new Date()}">
                                    <th>Date and Time</th>
                                    <td x-text="date.toLocaleString()"></td>
                                </tr>
                            </table>

                            <div class="d-flex justify-content-center mt-4">
                                <button class="btn btn-success me-2" @click="confirmDetails()">I Confirm</button>
                                <button class="btn btn-danger" @click="cancelAssessment()">Cancel</button> 
                            </div>

                        </div>
                    </div>
                </div>
            </div>
         </div>
     

     
    </main>
    <!-- Main Content Ends -->

    <!-- Footer Starts -->
    <footer
      class="position-fixed bottom-0 w-100 bg-secondary py-1 text-light mt-5"
    >
      <div class="container d-flex justify-content-center align-items-center">
        <span class="me-2">
          <small>&copy; iMOES Version 2.0.0</small>
        </span>
      </div>
    </footer>
    <!-- Footer Ends -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Login JS -->
    <script src="assets/js/login.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/tooltip.js"></script>
    <!-- app -->
    <script src="assets/js/app.js"></script>
  </body>
</html>
