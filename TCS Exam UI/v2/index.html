<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mock Examination Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+Bengali:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Base CSS -->
    <link rel="stylesheet" href="assets/css/base.css">
    <!-- Styles CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body class="bg-body">
    <!-- Header Starts -->
    <header>
     <div class="container-fluid bg-body-tertiary">
        <div class="row align-items-center py-2">
          <div class="col-md-6">
            <div class="pb-2">
              <div class="fw-bold text-uppercase border border-4 border-black rounded py-2 px-3 d-inline-block text-center bg-warning-subtle">
                <a class="text-decoration-none text-dark" href="javascript:void(0);">
                RRB NTPC Graduate Level Examination, Tier-1, 2023
              </a>
              </div>
            </div>

          </div>


          <div class="col-md-6 d-flex justify-content-end align-items-center">
             <!-- Show Setting Dropdown button  -->
             <div class="dropdown">
              <button class="btn btn-secondary dropdown-toggle btn-sm" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-gear"></i>
                Settings
              </button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="javascript:void(0);" onclick="openFullscreen();" >
                  <i class="bi bi-arrows-fullscreen"></i>
                  Open Fullscreen
                </a></li>
                <li><a class="dropdown-item" href="javascript:void(0);" onclick="closeFullscreen();">
                  <i class="bi bi-x-lg"></i>
                  Close Fullscreen
                </a></li>
              </ul>
            </div>
          </div> 
        </div>
      </div>
    </header>
    <!-- Header Ends -->

    <!-- Main Content Starts -->
    <main class="mb-5 pb-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-sm-12 col-md-8 col-lg-5">
            <div class="card mt-5">
              <div class="card-header">
                <h5 class="card-title">Candidate Login</h5>
              </div>
              <div class="card-body">

                <!-- Error Message -->
                <div class="alert alert-danger bg-danger text-light" role="alert">
                 <strong><i class="bi bi-exclamation-triangle-fill"></i> Error (ERR11) :</strong>  Exam has not started yet. Please wait for the exam to begin.
                </div>

                <form class="p-2">
                  <div class="input-group input-group-lg mb-3">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control" placeholder="Enter Username"  value="candidate123" readonly>
                  </div>
                  <div class="input-group input-group-lg mb-3">
                    <span class="input-group-text"><i class="bi bi-shield-lock-fill"></i></span>
                    <input type="password" class="form-control" placeholder="Enter Password">
                    <span class="input-group-text" data-bs-toggle="tooltip" data-bs-title="Virtual Keyboard"><i class="bi bi-keyboard"></i></span>
                  </div>

                  <!-- Remaining Time Message -->
                  <div class="alert text-danger text-center" role="alert">
                    Candidate can start the exam after:
                    <!-- display in HH:MM:SS format -->
                    <div class="fw-bold">
                      <span class="remaining-time">00Hrs.:</span>
                      <span class="remaining-time">00Min.:</span>
                      <span class="remaining-time">00Sec.</span>
                    </div>
                  </div>

                  <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Login</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- Main Content Ends -->

    <!-- Footer Starts -->
    <footer class="position-fixed bottom-0 w-100 bg-secondary py-1 text-light mt-5">
      <div class="container d-flex justify-content-center align-items-center">
        <span class="me-2">
          <small>&copy; iMOES Version 2.0.0</small>
        </span>
      </div>
    </footer>
    <!-- Footer Ends -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/tooltip.js"></script>
  </body>
</html>
