<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mock Examination Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+Bengali:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Base CSS -->
    <link rel="stylesheet" href="assets/css/base.css">
  </head>
  <body>
    <!-- Header Starts -->
    <header>
      <!-- Navigation Bar Starts -->
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand" href="#">Mock Examination</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">About</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <!-- Navigation Bar Ends -->
    </header>
    <!-- Header Ends -->

    <!-- Main Content Starts -->
    <main>
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-sm-12 col-md-8 col-lg-5">
            <div class="card mt-5">
              <div class="card-header">
                <h5 class="card-title">Candidate Login</h5>
              </div>
              <div class="card-body">

                <!-- Error Message -->
                <div class="alert alert-danger bg-danger text-light" role="alert">
                 <strong><i class="bi bi-exclamation-triangle-fill"></i> Error (ERR11) :</strong>  Exam has not started yet. Please wait for the exam to begin.
                </div>

                <form class="p-2">
                  <div class="input-group input-group-lg mb-3">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control" placeholder="Enter Username" aria-label="Username" value="candidate123" data-bs-toggle="tooltip" data-bs-title="Username is pre-filled and cannot be changed" readonly>
                  </div>
                  <div class="input-group input-group-lg mb-3">
                    <span class="input-group-text"><i class="bi bi-shield-lock-fill"></i></span>
                    <input type="password" class="form-control" placeholder="Enter Password" aria-label="Password" data-bs-toggle="tooltip" data-bs-title="Enter your password">
                    <span class="input-group-text" data-bs-toggle="tooltip" data-bs-title="Virtual Keyboard"><i class="bi bi-keyboard"></i></span>
                  </div>

                  <!-- Remaining Time Message -->
                  <div class="alert text-danger text-center" role="alert">
                    Candidate can start the exam after:
                    <!-- display in HH:MM:SS format -->
                    <div class="fw-bold">
                      <span class="remaining-time">00Hrs.:</span>
                      <span class="remaining-time">00Min.:</span>
                      <span class="remaining-time">00Sec.</span>
                    </div>
                  </div>

                  <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Login</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- Main Content Ends -->

    <!-- Footer Starts -->
    <footer>
      <div class="container">
        <p>&copy; 2023 Mock Examination. All rights reserved.</p>
      </div>
    </footer>
    <!-- Footer Ends -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/tooltip.js"></script>
  </body>
</html>
